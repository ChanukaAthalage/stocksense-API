name: Deploy to VPS

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/stocksense-API
            git fetch origin main
            git reset --hard ${{ github.sha }}
            git clean -fd
            docker build -t stocksense-api .
            docker stop stocksense || true
            docker rm stocksense || true
            docker run -d \
              -p 5000:5000 \
              --env-file .env \
              --name stocksense \
              --restart unless-stopped \
              stocksense-api
            sleep 10
            for i in 1 2 3 4 5; do
              curl -sf --connect-timeout 5 --max-time 10 http://localhost:5000/api/v1/health && break
              echo "Health check attempt $i failed, retrying..."
              sleep 5
            done || {
              docker logs stocksense
              exit 1
            }